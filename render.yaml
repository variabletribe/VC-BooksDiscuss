# Render Blueprint: Web Service + PostgreSQL
# https://render.com/docs/blueprint-spec
#
# Web service gets RENDER_EXTERNAL_URL + PORT so the bot can use Telegram webhooks (no getUpdates),
# which avoids "Conflict: terminated by other getUpdates" when a second poller exists.
# You cannot change an existing Worker into a Web service in place — create a Web service and
# remove the old Worker if migrating.
#
# After deploy: set BOT_TOKEN in the Render dashboard (Environment) if not using a secret file.
# Optional: TELEGRAM_WEBHOOK_SECRET (Telegram sends X-Telegram-Bot-Api-Secret-Token).
# Use exactly ONE service with this repo per BOT_TOKEN. Suspend any old Worker that still polls.
# Dashboard → service → Settings: set Python to 3.12 if logs show 3.14 (match PYTHON_VERSION below).

databases:
  - name: vc-bot-db
    databaseName: vc_bot
    plan: free

services:
  - type: web
    name: vc-bot
    runtime: python
    plan: free
    numInstances: 1
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vc-bot-db
          property: connectionString
      - key: MONTHLY_REPORT_HOUR_UTC
        value: "9"
